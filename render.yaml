services:
  # ─── Single Web Service: serves API + static frontend ─────────
  - type: web
    name: telugu-ai-companion
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
